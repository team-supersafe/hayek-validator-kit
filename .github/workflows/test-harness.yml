name: test-harness

on:
  pull_request:
    paths:
      - "test-harness/**"
      - "docs/TEST_HARNESS_*.md"
      - "scripts/vm-test/**"
      - "solana-localnet/**"
      - "ansible/**"
      - "bare-metal/latitudesh/**"
      - "ansible-tests/scripts/run-all-tests.sh"
      - "ansible-tests/scripts/run-harness-contract-tests.sh"
      - "ansible-tests/scripts/run-pr-228-regression-smoke.sh"
      - ".github/workflows/test-harness.yml"
  workflow_dispatch:
    inputs:
      run_infra:
        description: "Run infrastructure-backed matrix on self-hosted runners"
        required: true
        default: false
        type: boolean
      scenario:
        description: "Scenario name"
        required: true
        default: "agave_only"
        type: string

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install workflow dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Ensure executables
        run: |
          chmod +x test-harness/bin/hvk-test
          chmod +x test-harness/targets/*.sh
          chmod +x ansible-tests/scripts/run-harness-contract-tests.sh
          chmod +x ansible-tests/scripts/run-pr-228-regression-smoke.sh
          chmod +x bare-metal/latitudesh/*.sh || true

      - name: Harness list
        run: ./test-harness/bin/hvk-test list --json | jq '.'

      - name: Adapter describe
        run: |
          ./test-harness/bin/hvk-test describe --target compose --scenario agave_only --json | jq '.'
          ./test-harness/bin/hvk-test describe --target vm --scenario agave_only --json | jq '.'
          ./test-harness/bin/hvk-test describe --target latitude --scenario agave_only --json | jq '.'

      - name: Ansible harness contract script
        run: ./ansible-tests/scripts/run-harness-contract-tests.sh

      - name: Lightweight regression smoke
        run: ./ansible-tests/scripts/run-pr-228-regression-smoke.sh --skip-syntax

  infra_matrix:
    if: github.event_name == 'workflow_dispatch' && inputs.run_infra
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        target: [compose, vm, latitude]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure executables
        run: |
          chmod +x test-harness/bin/hvk-test
          chmod +x test-harness/targets/*.sh
          chmod +x scripts/vm-test/*.sh
          chmod +x solana-localnet/tests/*.sh
          chmod +x bare-metal/latitudesh/*.sh || true

      - name: Run target smoke
        env:
          LATITUDE_OPERATOR_NAME: ${{ secrets.LATITUDE_OPERATOR_NAME }}
          LATITUDE_OPERATOR_SSH_PUBLIC_KEY: ${{ secrets.LATITUDE_OPERATOR_SSH_PUBLIC_KEY }}
          LATITUDE_OPERATOR_SSH_PRIVATE_KEY_FILE: ${{ secrets.LATITUDE_OPERATOR_SSH_PRIVATE_KEY_FILE }}
        run: |
          case "${{ matrix.target }}" in
            compose)
              ./test-harness/bin/hvk-test run \
                --target compose \
                --scenario "${{ inputs.scenario }}" \
                --compose-engine docker
              ;;
            vm)
              ./test-harness/bin/hvk-test run \
                --target vm \
                --scenario "${{ inputs.scenario }}" \
                --vm-profile small
              ;;
            latitude)
              if [ -z "${LATITUDE_OPERATOR_NAME}" ] || [ -z "${LATITUDE_OPERATOR_SSH_PUBLIC_KEY}" ]; then
                echo "Skipping latitude target: required secrets are not configured."
                exit 0
              fi
              ./test-harness/bin/hvk-test run \
                --target latitude \
                --scenario "${{ inputs.scenario }}" \
                --operator-name "${LATITUDE_OPERATOR_NAME}" \
                --operator-ssh-public-key "${LATITUDE_OPERATOR_SSH_PUBLIC_KEY}" \
                --operator-ssh-private-key-file "${LATITUDE_OPERATOR_SSH_PRIVATE_KEY_FILE:-}"
              ;;
          esac
