---
- name: Converge
  hosts: all
  become: true
  vars:
    # Use the same variable pattern as production: csv_file
    # This should be passed as extra variable: -e "csv_file=molecule_test_users.csv"
    molecule_csv_file: "{{ csv_file | default('molecule_test_users.csv') }}"
    # Source CSV directory - check multiple locations
    molecule_csv_source_dir: "{{ csv_source_dir | default('~/new-metal-box') }}"
    # Create temporary directory for CSV file
    molecule_csv_dir: "/tmp/molecule"
  pre_tasks:
    - name: Check if CSV file exists in source directory
      become: false
      delegate_to: localhost
      ansible.builtin.stat:
        path: "{{ molecule_csv_source_dir }}/{{ molecule_csv_file }}"
      register: source_csv_stat

    - name: Fail if CSV file not found
      ansible.builtin.fail:
        msg: "CSV file {{ molecule_csv_file }} not found in {{ molecule_csv_source_dir }}. Available files: {{ available_csv_files.stdout_lines | default(['none']) }}"
      when: not source_csv_stat.stat.exists
      vars:
        available_csv_files: "{{ lookup('pipe', 'ls ' + molecule_csv_source_dir + '/*.csv 2>/dev/null || echo') }}"

    - name: Create molecule CSV directory
      become: false
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ molecule_csv_dir }}"
        state: directory
        mode: '0755'

    - name: Copy real CSV file to molecule directory
      become: false
      delegate_to: localhost
      ansible.builtin.copy:
        src: "{{ molecule_csv_source_dir }}/{{ molecule_csv_file }}"
        dest: "{{ molecule_csv_dir }}/{{ molecule_csv_file }}"
        mode: '0644'

    - name: Display CSV content for verification
      become: false
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "Using CSV file: {{ molecule_csv_file }} from {{ molecule_csv_source_dir }}"

    # Mirror production prechecks from pb_setup_users_validator.yml so role conditionals
    # (sol_user_in_csv / has_validator_operators / has_validator_viewers) are set.
    - name: Read CSV to derive RBAC precheck facts
      become: false
      delegate_to: localhost
      community.general.read_csv:
        path: "{{ molecule_csv_dir }}/{{ molecule_csv_file }}"
        key: user
      register: users_csv_precheck

    - name: Set RBAC role presence facts from CSV
      ansible.builtin.set_fact:
        sol_user_in_csv: "{{ solana_user in users_csv_precheck.dict.keys() }}"
        has_validator_operators: >-
          {{
            users_csv_precheck.dict.values() | selectattr('group_a', 'defined') | selectattr('group_a', 'equalto', rbac_roles.operators) | list | length > 0 or
            users_csv_precheck.dict.values() | selectattr('group_b', 'defined') | selectattr('group_b', 'equalto', rbac_roles.operators) | list | length > 0 or
            users_csv_precheck.dict.values() | selectattr('group_c', 'defined') | selectattr('group_c', 'equalto', rbac_roles.operators) | list | length > 0
          }}
        has_validator_viewers: >-
          {{
            users_csv_precheck.dict.values() | selectattr('group_a', 'defined') | selectattr('group_a', 'equalto', rbac_roles.viewers) | list | length > 0 or
            users_csv_precheck.dict.values() | selectattr('group_b', 'defined') | selectattr('group_b', 'equalto', rbac_roles.viewers) | list | length > 0 or
            users_csv_precheck.dict.values() | selectattr('group_c', 'defined') | selectattr('group_c', 'equalto', rbac_roles.viewers) | list | length > 0
          }}

  roles:
    # STEP 1: First, set up RBAC-enabled host by running iam_manager role
    # This creates users, groups, and sudoers.d rules for least privilege
    - role: "iam_manager"
      vars:
        # Override the users_file to point to our test CSV using same pattern as production
        users_file: "{{ molecule_csv_dir }}/{{ molecule_csv_file }}"
        # Allow re-running tests without failing on existing users
        molecule_testing: true
        # Satisfy role argument spec requirements in Molecule context
        target_host: "{{ inventory_hostname }}"
        ansible_user: "{{ hostvars[inventory_hostname].ansible_user | default('root') }}"
        csv_file: "{{ molecule_csv_file }}"

    # STEP 2: Now that the host is RBAC-enabled, install Rust environment
    # This role installs Rust system-wide under /usr/local/cargo and /usr/local/rustup
    - role: "rust_env_v2"
      vars:
        molecule_testing: true
