---
scenario:
  name: rust_env_v2_tests
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - verify
    - destroy

dependency:
  name: shell
  command: |
    cd /hayek-validator-kit/ansible-tests
    DOCKER_BUILDKIT=1 docker build --target naked-builder -t molecule-host-alpha .

driver:
  name: docker

platforms:
  - name: rust-env-v2-tests
    image: molecule-host-alpha
    pre_build_image: true
    privileged: true
    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
      # SSH agent mount (use MOLECULE_SSH_AUTH_SOCK if set, otherwise fall back to SSH_AUTH_SOCK or /dev/null)
      # When running in test-runner container, MOLECULE_SSH_AUTH_SOCK is set to /dev/null
      - "${MOLECULE_SSH_AUTH_SOCK:-${SSH_AUTH_SOCK:-/dev/null}}:/ssh-agent:ro"
      - "/tmp/molecule_ssh_keys:/tmp/team_ssh_public_keys:ro"
    tmpfs:
      - /run
      - /run/lock
    environment:
      DEFAULT_USERNAME: ubuntu
      SSH_AUTH_SOCK: /ssh-agent
    command: |
      bash -c "
      # Create ubuntu user if it doesn't exist (like docker-compose does)
      id -u ubuntu >/dev/null 2>&1 || adduser --disabled-password --gecos \"\" ubuntu

      /opt/scripts/setup-ssh-keys.sh ubuntu
      /lib/systemd/systemd
      "

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  env:
    ANSIBLE_ROLES_PATH: "/hayek-validator-kit/ansible/roles"
    # Temporary workaround for ansible-core 2.19 strict conditionals breaking molecule-docker playbooks
    ALLOW_BROKEN_CONDITIONALS: "1"
  config_options:
    defaults:
      # Temporary workaround for ansible-core 2.19 strict conditionals breaking molecule-docker playbooks
      allow_broken_conditionals: true
  inventory:
    hosts:
      all:
        hosts:
          rust-env-v2-tests:
        children:
          solana:
            hosts:
              rust-env-v2-tests:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
        ansible_user: root
        remote_tmp: /tmp/.ansible/tmp
        ansible_remote_tmp: /tmp/.ansible/tmp
        # Skip interactive pauses in testing
        skip_confirmation_pauses: true
        # Baseline Solana paths expected by iam_manager precheck
        mount_base_path: "/mnt"
        system_solana_install_dir: "/opt/solana"
        system_solana_active_release_dir: "{{ system_solana_install_dir }}/active_release/bin"
        system_solana_installed_releases_dir: "{{ system_solana_install_dir }}/releases"
        system_shared_build_dir: "/opt/build"
        # Rust environment variables (system-wide installation)
        cargo_home: "/usr/local/cargo"
        rustup_home: "/usr/local/rustup"
      solana:
        # Variables normally sourced from ansible/group_vars/solana.yml
        validator_root_dir: "/opt/validator"
        validator_scripts_dir: "{{ validator_root_dir }}/scripts"
        validator_logs_dir: "{{ validator_root_dir }}/logs"
        validator_keys_dir: "{{ validator_root_dir }}/keys"
        validator_operators_group: "validator_operators"

verifier:
  name: ansible
