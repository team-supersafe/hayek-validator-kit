---
# Jito-Solana CLI Setup
# -------------------
# Installs Jito-Solana CLI binaries.
#
# Usage:
# ------
# Run from /ansible directory:
#
# For syntax check add --syntax-check
# For dry run add --diff --check
#
# ansible-playbook playbooks/pb_install_solana_cli_jito.yml \
#   -i solana_localnet.yml \
#   --limit host-charlie \
#   -e "target_host=host-charlie" \
#   -e "operator_user=bob" \
#   -e "jito_version=3.1.10" \        # Use X.Y.Z-beta.N for testnet pre-releases (e.g. 4.0.0-beta.2)
#   -e "solana_cluster=mainnet" \     # Optional: one of localnet | testnet | mainnet; omit for the CLI default config
#   -e "jito_version_patch=1" \       # Optional: Patch version to append to jito tag (e.g. 3.1.10-jito.1)
#   -e "build_from_source=true" \     # Optional: Build from source instead of using precompiled binaries
#   -e "use_official_repo=true" \     # Optional: Use official repository instead of forked repository

- name: Install Jito-Solana CLI
  hosts: "{{ target_host }}"
  user: "{{ operator_user }}"
  become: false

  pre_tasks:
    - name: Assert required parameters are defined
      ansible.builtin.assert:
        that:
          - target_host is defined
          - jito_version is defined
          - operator_user is defined
          - solana_cluster is not defined or solana_cluster in ['localnet', 'testnet', 'mainnet']
        fail_msg: >
          Missing required variables.
          Must provide:
            - target_host
            - jito_version
            - operator_user
          Optional:
            - solana_cluster (one of: localnet, testnet, mainnet)
            - jito_version_patch (set to append a patch version to jito tag, e.g. 1 for 3.1.10-jito.1)

  roles:
    - role: solana_cli_jito
      vars:
        jito_version: "{{ jito_version }}"
