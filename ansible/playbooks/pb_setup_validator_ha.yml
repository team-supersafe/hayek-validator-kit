---
# Solana Validator HA Setup
# ------------------------
# Installs or upgrades solana-validator-ha on an existing Hayek validator host.
# This playbook is intentionally install-only. Use pb_reconcile_validator_ha_cluster.yml
# for cluster-aware HA runtime staging and enablement.
#
# Usage:
# ------
# Run from /ansible directory:
#
# install/upgrade binary only
# ansible-playbook playbooks/pb_setup_validator_ha.yml \
#   -i solana_setup_host.yml \
#   --limit host-charlie \
#   -e "target_host=host-charlie" \
#   -e "ansible_user=bob" \
#   -e "validator_name=demo1" \
#   -e "solana_validator_ha_version=0.1.19" \
#   -K
#
# Extended vars:
# - solana_validator_ha_version (OPTIONAL): Version of solana-validator-ha to install. Defaults to the pinned latest binary release in the role.
# - solana_validator_ha_install_from_source (OPTIONAL): Build solana-validator-ha from source instead of using the published GitHub release binary.
# - solana_validator_ha_install_enabled (OPTIONAL): Install or upgrade the solana-validator-ha binary on the target host.
# - HA runtime configuration, service enablement, peer wiring, and public-IP helper rollout are intentionally handled only by pb_reconcile_validator_ha_cluster.yml.

- name: Install or configure Solana Validator HA on an existing validator host
  hosts: "{{ target_host }}"
  user: "{{ ansible_user }}"
  become: false

  pre_tasks:
    - name: Assert required parameters are defined
      ansible.builtin.assert:
        that:
          - target_host is defined
          - ansible_user is defined
          - validator_name is defined
        fail_msg: >
          Missing required playbook variables: target_host, ansible_user, validator_name

    - name: Gather facts required by Solana Validator HA
      ansible.builtin.setup:
        gather_subset:
          - min

    - name: Derive solana_cluster from inventory groups when absent
      ansible.builtin.set_fact:
        solana_cluster: >-
          {{
            (group_names | select('match', '^solana_.*') | list | first | regex_replace('^solana_', ''))
            if (group_names | select('match', '^solana_.*') | list | length > 0)
            else 'localnet'
          }}
      when: solana_cluster is not defined

    - name: Debug ansible_limit and target_host
      ansible.builtin.debug:
        msg:
          - "ansible_limit: {{ ansible_limit | default('not defined') }}"
          - "ansible_limit type: {{ ansible_limit | type_debug }}"
          - "target_host: {{ target_host }}"
          - "ansible_play_hosts: {{ ansible_play_hosts }}"
          - "solana_cluster: {{ solana_cluster | default('not defined') }}"

    - name: Validate that target_host matches the limited host
      ansible.builtin.assert:
        that:
          - ansible_limit is defined
          - target_host == ansible_limit
        fail_msg: >
          This playbook must be run with --limit to target exactly one host.
          Make sure you run this playbook with: --limit {{ target_host }} -e "target_host={{ target_host }}"

    - name: Set validator keyset directory fact
      ansible.builtin.set_fact:
        validator_keyset_dir: "{{ validator_keys_dir }}/{{ validator_name }}"

    - name: Validate validator keyset directory exists
      ansible.builtin.stat:
        path: "{{ validator_keyset_dir }}"
      register: validator_keyset_dir_stat
      become: true

    - name: Fail if validator keyset directory is missing
      ansible.builtin.fail:
        msg: >-
          Validator keyset directory {{ validator_keyset_dir }} does not exist on {{ inventory_hostname }}.
          This playbook is intended for existing Hayek validator hosts.
      when: not validator_keyset_dir_stat.stat.isdir | default(false)

  roles:
    - role: solana_validator_ha
