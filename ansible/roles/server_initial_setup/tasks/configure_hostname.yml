---
- name: Validate requested hostname format
  ansible.builtin.assert:
    that:
      - host_name | trim | length > 0
      - host_name | length <= 63
      - host_name is match('^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$')
    fail_msg: >
      Invalid host_name '{{ host_name }}'. Hostname must be 1-63 characters,
      use only letters, numbers, and hyphens, and must not start or end with a hyphen.
  when:
    - host_name is defined

- name: Remove existing 127.0.1.1 hostname aliases from /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    state: absent
  when:
    - host_name is defined
    - host_name | trim | length > 0

- name: Ensure /etc/hosts has canonical hostname mapping
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.1.1 {{ host_name }}"
    state: present
    insertafter: '^127\.0\.0\.1\s+'
  when:
    - host_name is defined
    - host_name | trim | length > 0

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ host_name }}"
    use: systemd
  when:
    - host_name is defined
    - host_name | trim | length > 0

- name: Mark hostname configuration as applied
  ansible.builtin.set_fact:
    server_initial_setup_hostname_applied: true
  when:
    - host_name is defined
    - host_name | trim | length > 0
