---
# This role performs initial system setup including package installation and basic configuration

- name: Disable package automation before package operations
  ansible.builtin.import_tasks: disable_package_automation.yml

- name: Wait for package manager readiness before package operations
  ansible.builtin.import_tasks: wait_for_package_manager.yml

# Update and upgrade packages
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: true
    autoclean: true
    autoremove: true

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - ethtool
      - htop
      - fail2ban
      - hwloc
      - xfsprogs  # For XFS filesystem operations
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
