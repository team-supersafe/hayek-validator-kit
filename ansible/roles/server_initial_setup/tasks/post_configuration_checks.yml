---
- name: Verify hostname configuration
  when:
    - host_name is defined
    - server_initial_setup_hostname_applied | default(false)
  block:
    - name: Check configured static hostname
      ansible.builtin.command: hostnamectl --static
      register: server_initial_setup_hostnamectl_check
      changed_when: false

    - name: Read configured 127.0.1.1 hostname mappings
      ansible.builtin.shell: grep -E '^127\.0\.1\.1[[:space:]]+' /etc/hosts || true
      register: server_initial_setup_hosts_mapping_check
      changed_when: false

    - name: Assert static hostname matches requested hostname
      ansible.builtin.assert:
        that:
          - server_initial_setup_hostnamectl_check.stdout == host_name
        fail_msg: >
          ERROR! Static hostname does not match requested hostname.
          Current value: {{ server_initial_setup_hostnamectl_check.stdout | default('') }}
        success_msg: "✓ Static hostname matches requested hostname"

    - name: Assert /etc/hosts has exactly one 127.0.1.1 mapping
      ansible.builtin.assert:
        that:
          - server_initial_setup_hosts_mapping_check.stdout_lines | length == 1
        fail_msg: >
          ERROR! /etc/hosts must contain exactly one 127.0.1.1 mapping.
          Current entries: {{ server_initial_setup_hosts_mapping_check.stdout_lines | default([]) }}
        success_msg: "✓ /etc/hosts contains a single 127.0.1.1 mapping"

    - name: Assert /etc/hosts mapping matches requested hostname
      ansible.builtin.assert:
        that:
          - server_initial_setup_hosts_mapping_check.stdout_lines[0] == "127.0.1.1 {{ host_name }}"
        fail_msg: >
          ERROR! /etc/hosts 127.0.1.1 mapping does not match requested hostname.
          Current entry: {{ (server_initial_setup_hosts_mapping_check.stdout_lines | first) | default('missing') }}
        success_msg: "✓ /etc/hosts 127.0.1.1 mapping matches requested hostname"

    - name: Mark hostname verification as successful
      ansible.builtin.set_fact:
        server_initial_setup_hostname_verified: true

# Post-configuration checks to verify that all system tuning was applied correctly
- name: Wait for system configuration to settle
  ansible.builtin.pause:
    seconds: 3
  when: not (server_initial_setup_hostname_only_checks | default(false) | bool)

- name: Post-configuration CPU checks
  when: not (server_initial_setup_hostname_only_checks | default(false) | bool)
  block:
    # Check CPU governor setting after configuration
    - name: Verify CPU governor is set to performance mode (post-config)
      ansible.builtin.shell: |
        for gov_file in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          if [ -f "$gov_file" ]; then
            cat "$gov_file"
          fi
        done | sort | uniq
      register: post_cpu_governor_check
      changed_when: false
      check_mode: false

    # Check AMD SMT/Hyperthreading status after configuration
    - name: Verify AMD SMT/Hyperthreading is enabled (post-config)
      ansible.builtin.shell: |
        # Method 1: Check through SMT directory (modern kernels)
        if [ -d "/sys/devices/system/cpu/smt" ] && [ -f "/sys/devices/system/cpu/smt/control" ]; then
          cat "/sys/devices/system/cpu/smt/control"
          exit $?
        fi

        # Method 2: Check by counting siblings per core
        siblings_count=$(cat /sys/devices/system/cpu/cpu0/topology/thread_siblings_list | tr ',' ' ' | wc -w)
        if [ "$siblings_count" -gt 1 ]; then
          echo "on"
          exit 0
        else
          echo "off"
          exit 1
        fi
      register: post_smt_check
      changed_when: false
      check_mode: false

    # Display post-configuration verification results
    - name: Display post-configuration CPU status
      ansible.builtin.debug:
        msg: |
          POST-CONFIGURATION CPU Status:
            - CPU Governor: {{ post_cpu_governor_check.stdout }}
            - AMD SMT/Hyperthreading: {{ post_smt_check.stdout }}

    # Assertions that will stop the playbook if they fail
    - name: Assert CPU governor is set to performance mode (post-config)
      ansible.builtin.assert:
        that: post_cpu_governor_check.stdout == "performance"
        fail_msg: "ERROR! CPU governor is not set to performance mode after configuration. Current value: {{ post_cpu_governor_check.stdout }}"
        success_msg: "✓ CPU governor correctly set to performance mode"
      ignore_errors: true

    - name: Assert AMD SMT/Hyperthreading is enabled (post-config)
      ansible.builtin.assert:
        that: post_smt_check.stdout == "on"
        fail_msg: "ERROR! AMD SMT/Hyperthreading is not enabled after configuration. Current status: {{ post_smt_check.stdout }}"
        success_msg: "✓ AMD SMT/Hyperthreading correctly enabled"
      ignore_errors: true

- name: Post-configuration system checks
  when: not (server_initial_setup_hostname_only_checks | default(false) | bool)
  block:
    # Verify CPU governor service is active
    - name: Check CPU governor service status
      ansible.builtin.systemd:
        name: cpu-governor
      register: cpu_governor_service_status
      when: manage_cpu_governor_service | default(true) | bool

    - name: Assert CPU governor service is active
      ansible.builtin.assert:
        that: cpu_governor_service_status.status.ActiveState == "active"
        fail_msg: "ERROR! CPU governor service is not active. Status: {{ cpu_governor_service_status.status.ActiveState }}"
        success_msg: "✓ CPU governor service is active"
      ignore_errors: true
      when: manage_cpu_governor_service | default(true) | bool

    # Verify sysctl configurations are applied
    - name: Check key sysctl parameters
      ansible.builtin.shell: sysctl {{ item }}
      register: sysctl_check
      changed_when: false
      loop:
        - "net.ipv4.tcp_congestion_control"
        - "vm.swappiness"
        - "vm.max_map_count"
        - "kernel.timer_migration"

    - name: Display sysctl parameters
      ansible.builtin.debug:
        msg: "{{ sysctl_check.results | map(attribute='stdout') | list }}"

    # Verify firewall rules for authorized IPs
    - name: Check UFW status and rules
      ansible.builtin.shell: ufw status numbered
      register: ufw_status_check
      changed_when: false

    - name: Display firewall status
      ansible.builtin.debug:
        msg: "{{ ufw_status_check.stdout_lines }}"

    - name: Verify authorized IPs are in firewall rules
      ansible.builtin.shell: |
        # Use word boundaries to ensure exact IP match, not substring
        ufw status | grep -E "\b{{ item.value.ip }}\b" || echo "IP not found: {{ item.value.ip }}"
      register: ip_firewall_check
      changed_when: false
      loop: "{{ authorized_ips_csv.dict | dict2items }}"
      when: authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0

    - name: Display IP firewall check results
      ansible.builtin.debug:
        msg: "{{ ip_firewall_check.results | map(attribute='stdout') | list }}"
      when: authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0

    - name: Verify rendered fail2ban ignoreip includes authorized IPs
      ansible.builtin.shell: |
        sed -n 's/^ignoreip = //p' /etc/fail2ban/jail.d/defaults-debian.conf | tr ' ' '\n' | grep -Fx "{{ item.value.ip }}"
      register: ip_fail2ban_check
      changed_when: false
      loop: "{{ authorized_ips_csv.dict | dict2items }}"
      loop_control:
        label: "{{ item.value.ip }} ({{ item.value.comment }})"
      when: authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0

    - name: Display rendered fail2ban ignoreip check results
      ansible.builtin.debug:
        msg: "{{ ip_fail2ban_check.results | map(attribute='stdout') | list }}"
      when: authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0

- name: Final configuration summary
  ansible.builtin.debug:
    msg: |
      ========================================
      POST-CONFIGURATION VERIFICATION COMPLETE
      ========================================
      
      {{ '✓ Hostname configuration verified' if (server_initial_setup_hostname_verified | default(false)) else ('- Hostname configuration check skipped' if not (server_initial_setup_hostname_applied | default(false)) else 'ERROR! Hostname configuration verification did not complete') }}
      {{ '✓ CPU Performance Configuration Verified' if not (server_initial_setup_hostname_only_checks | default(false) | bool) else '- CPU Performance Configuration Check Skipped (hostname-only validation mode)' }}
      {{ '✓ System Tuning Parameters Applied' if not (server_initial_setup_hostname_only_checks | default(false) | bool) else '- System Tuning Checks Skipped (hostname-only validation mode)' }}
      {{ '✓ Firewall Rules for Authorized IPs Active' if (not (server_initial_setup_hostname_only_checks | default(false) | bool) and authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0) else ('- Firewall Rules for Authorized IPs Check Skipped (authorized_ips_csv not loaded in this tag scope)' if not (server_initial_setup_hostname_only_checks | default(false) | bool) else '- Firewall Rules Check Skipped (hostname-only validation mode)') }}
      {{ '✓ Fail2ban Trusted IP Config Rendered' if (not (server_initial_setup_hostname_only_checks | default(false) | bool) and authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0) else ('- Fail2ban Trusted IP Config Check Skipped (authorized_ips_csv not loaded in this tag scope)' if not (server_initial_setup_hostname_only_checks | default(false) | bool) else '- Fail2ban Checks Skipped (hostname-only validation mode)') }}
      {{ '✓ All Services Running Correctly' if not (server_initial_setup_hostname_only_checks | default(false) | bool) else '- Service Checks Skipped (hostname-only validation mode)' }}
      
      System is ready for Solana validator deployment.
      ========================================
