---
- name: Validate requested hostname format
  ansible.builtin.assert:
    that:
      - host_name | trim | length > 0
      - host_name | length <= 63
      - host_name is match('^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$')
    fail_msg: >
      Invalid host_name '{{ host_name }}'. Hostname must be 1-63 characters,
      use only letters, numbers, and hyphens, and must not start or end with a hyphen.
  when:
    - host_name is defined
  tags: [restart, pre-reboot-hostname]

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ host_name }}"
    use: systemd
  when:
    - host_name is defined
    - host_name | trim | length > 0
  tags: [restart, pre-reboot-hostname]

- name: Ensure /etc/hosts has hostname mapping
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ host_name }}"
    state: present
  when:
    - host_name is defined
    - host_name | trim | length > 0
  tags: [restart, pre-reboot-hostname]

- name: Countdown before automatic reboot
  ansible.builtin.pause:
    seconds: 10
    prompt: |
      Server reboot will start automatically in 10 seconds.

      Press Ctrl+C now to abort the playbook before reboot.
  delegate_to: localhost
  run_once: true

- name: Capture current SSH connection port
  ansible.builtin.set_fact:
    server_initial_setup_active_ssh_port: "{{ ansible_port | default(ansible_ssh_port | default(22)) | int }}"

- name: Apply pending SSH and firewall handler changes before reboot
  ansible.builtin.meta: flush_handlers

- name: Display reconnection instructions
  ansible.builtin.debug:
    msg: |
      -------------------------------------------------
      THE SERVER IS NOW RESTARTING

      To reconnect, please use:
      ssh {{ ansible_user }}@{{ ansible_host | default(ansible_facts['default_ipv4']['address']) }} -p {{ firewall.ssh_port }}

      Please allow a few minutes for the server to complete the restart.
      -------------------------------------------------
  run_once: true
  delegate_to: localhost

- name: Wait for configured SSH port to accept connections before reconnecting
  ansible.builtin.wait_for:
    host: "{{ ansible_host | default(ansible_facts['default_ipv4']['address']) }}"
    port: "{{ firewall.ssh_port | int }}"
    state: started
    delay: 0
    sleep: 2
    timeout: 120
  delegate_to: localhost
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Update SSH connection port for reboot wait
  ansible.builtin.set_fact:
    ansible_port: "{{ firewall.ssh_port }}"
    ansible_ssh_port: "{{ firewall.ssh_port }}"
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Reset SSH control connection after port change
  ansible.builtin.include_tasks:
    file: reset_connection_after_port_change.yml
    apply:
      tags:
        - restart
        - access-validation
  tags:
    - restart
    - access-validation
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Verify Ansible can reconnect on the configured SSH port before rebooting
  ansible.builtin.wait_for_connection:
    connect_timeout: 5
    delay: 0
    sleep: 2
    timeout: 120

- name: Initiate server reboot
  ansible.builtin.reboot:
    reboot_timeout: 900
    connect_timeout: 5
    post_reboot_delay: 10
    test_command: whoami

- name: End playbook - Server is rebooting
  ansible.builtin.meta: end_play
