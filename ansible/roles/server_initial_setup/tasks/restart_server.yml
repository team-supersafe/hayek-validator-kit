---
- name: Include hostname configuration tasks
  ansible.builtin.include_tasks:
    file: configure_hostname.yml
    apply:
      tags:
        - restart
        - pre-reboot-hostname
  tags:
    - restart
    - pre-reboot-hostname

- name: Run hostname-only post-configuration checks
  ansible.builtin.include_tasks:
    file: post_configuration_checks.yml
    apply:
      tags:
        - restart
        - pre-reboot-hostname
  vars:
    server_initial_setup_hostname_only_checks: true
  tags:
    - restart
    - pre-reboot-hostname
  when:
    - host_name is defined
    - host_name | trim | length > 0

- name: Countdown before automatic reboot
  ansible.builtin.pause:
    seconds: 10
    prompt: |
      Server reboot will start automatically in 10 seconds.

      Press Ctrl+C now to abort the playbook before reboot.
  delegate_to: localhost
  run_once: true
  become: false

- name: Capture current SSH connection port
  ansible.builtin.set_fact:
    server_initial_setup_active_ssh_port: "{{ ansible_port | default(ansible_ssh_port | default(22)) | int }}"

- name: Apply pending SSH and firewall handler changes before reboot
  ansible.builtin.meta: flush_handlers

- name: Display reconnection instructions
  ansible.builtin.debug:
    msg: |
      -------------------------------------------------
      THE SERVER IS NOW RESTARTING

      To reconnect, please use:
      ssh {{ ansible_user }}@{{ ansible_host | default(ansible_facts['default_ipv4']['address']) }} -p {{ firewall.ssh_port }}

      Please allow a few minutes for the server to complete the restart.
      -------------------------------------------------
  run_once: true
  delegate_to: localhost
  become: false

- name: Wait for configured SSH port to accept connections before reconnecting
  ansible.builtin.wait_for:
    host: "{{ ansible_host | default(ansible_facts['default_ipv4']['address']) }}"
    port: "{{ firewall.ssh_port | int }}"
    state: started
    delay: 0
    sleep: 2
    timeout: 120
  delegate_to: localhost
  become: false
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Update SSH connection port for reboot wait
  ansible.builtin.set_fact:
    ansible_port: "{{ firewall.ssh_port }}"
    ansible_ssh_port: "{{ firewall.ssh_port }}"
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Reset SSH control connection after port change
  ansible.builtin.include_tasks:
    file: reset_connection_after_port_change.yml
    apply:
      tags:
        - restart
        - access-validation
  tags:
    - restart
    - access-validation
  when:
    - firewall.ssh_port is defined
    - server_initial_setup_security_tasks_ran | default(false)
    - server_initial_setup_active_ssh_port != (firewall.ssh_port | int)

- name: Verify Ansible can reconnect on the configured SSH port before rebooting
  ansible.builtin.wait_for_connection:
    connect_timeout: 5
    delay: 0
    sleep: 2
    timeout: 120

- name: Verify live fail2ban ignoreip after handlers apply
  ansible.builtin.shell: |
    fail2ban-client get sshd ignoreip | awk '/^[|`]- / {print $2}' | grep -Fx "{{ item.value.ip }}"
  register: live_ip_fail2ban_check
  changed_when: false
  loop: "{{ authorized_ips_csv.dict | dict2items }}"
  loop_control:
    label: "{{ item.value.ip }} ({{ item.value.comment }})"
  when:
    - server_initial_setup_security_tasks_ran | default(false)
    - authorized_ips_csv is defined
    - authorized_ips_csv.dict | length > 0

- name: Display live fail2ban ignoreip check results
  ansible.builtin.debug:
    msg: "{{ live_ip_fail2ban_check.results | map(attribute='stdout') | list }}"
  when:
    - server_initial_setup_security_tasks_ran | default(false)
    - authorized_ips_csv is defined
    - authorized_ips_csv.dict | length > 0

- name: Initiate server reboot
  ansible.builtin.reboot:
    reboot_timeout: 900
    connect_timeout: 5
    post_reboot_delay: 10
    test_command: whoami

- name: End playbook - Server is rebooting
  ansible.builtin.meta: end_play
