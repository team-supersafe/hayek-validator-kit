---
# Configure CPU isolation
- name: Install lstopo for CPU topology
  ansible.builtin.apt:
    name: hwloc
    state: present
  when:
    - ansible_facts['architecture'] == "x86_64"
    - not (cpu_isolation_validation_only | default(false) | bool)

- name: Get HT sibling of PoH core
  ansible.builtin.command: "cat /sys/devices/system/cpu/cpu{{ cpu_config.poh_core }}/topology/thread_siblings_list"
  register: _thread_siblings
  changed_when: false
  check_mode: false
  when: ansible_facts['architecture'] == "x86_64"

- name: Get total logical CPU count
  ansible.builtin.command: nproc --all
  register: _nproc
  changed_when: false
  check_mode: false
  when: ansible_facts['architecture'] == "x86_64"

- name: Derive PoH core and HT sibling
  ansible.builtin.set_fact:
    _cpu_poh: "{{ cpu_config.poh_core | int }}"
    _cpu_sibling: "{{ _thread_siblings.stdout.split(',') | map('trim') | reject('equalto', cpu_config.poh_core | string) | first | int }}"
    _cpu_total: "{{ _nproc.stdout | trim | int }}"
  when: ansible_facts['architecture'] == "x86_64"

- name: Detect AMD CPU for p-state kernel parameters
  ansible.builtin.set_fact:
    _server_initial_setup_cpu_is_amd: "{{ (ansible_facts.processor | default([]) | join(' ')) is search('AMD|AuthenticAMD') }}"
  when: ansible_facts['architecture'] == "x86_64"

- name: Compute irq_cores string (all cores except PoH core and its HT sibling)
  ansible.builtin.shell: |
    python3 -c "
    total = {{ _cpu_total | int }}
    excluded = { {{ _cpu_poh | int }}, {{ _cpu_sibling | int }} }
    cores = [i for i in range(total) if i not in excluded]
    ranges, start, prev = [], cores[0], cores[0]
    for c in cores[1:]:
        if c != prev + 1:
            ranges.append(str(start) if start == prev else f'{start}-{prev}')
            start = c
        prev = c
    ranges.append(str(start) if start == prev else f'{start}-{prev}')
    print(','.join(ranges))
    "
  register: _irq_cores
  changed_when: false
  check_mode: false
  when: ansible_facts['architecture'] == "x86_64"

- name: Read effective existing GRUB default kernel parameters
  ansible.builtin.shell: |
    set -e
    for grub_defaults_file in /etc/default/grub /etc/default/grub.d/*.cfg; do
      [ -r "$grub_defaults_file" ] || continue
      . "$grub_defaults_file"
    done
    printf '%s\n' "${GRUB_CMDLINE_LINUX_DEFAULT:-}"
  args:
    executable: /bin/bash
  register: _grub_cmdline_linux_default_existing
  changed_when: false
  check_mode: false
  when: ansible_facts['architecture'] == "x86_64"

- name: Build canonical validator kernel parameters
  ansible.builtin.set_fact:
    _server_initial_setup_grub_canonical_params: >-
      {{
        [
          'quiet',
          'audit=1',
          'audit_backlog_limit=8192',
          'intel_idle.max_cstate=0',
          'processor.max_cstate=0'
        ]
        + (['amd_pstate=' ~ cpu_config.pstate] if (_server_initial_setup_cpu_is_amd | default(false) | bool) else [])
        + [
          'nohz_full=' ~ _cpu_poh ~ ',' ~ _cpu_sibling,
          'isolcpus=domain,managed_irq,' ~ _cpu_poh ~ ',' ~ _cpu_sibling,
          'irqaffinity=' ~ (_irq_cores.stdout | trim)
        ]
      }}
  when: ansible_facts['architecture'] == "x86_64"

- name: Merge provider GRUB defaults with validator kernel parameters
  ansible.builtin.set_fact:
    _server_initial_setup_grub_cmdline_params: >-
      {{
        (
          (_grub_cmdline_linux_default_existing.stdout | default('') | split())
          | reject('equalto', 'quiet')
          | reject('equalto', 'audit=1')
          | reject('equalto', 'audit_backlog_limit=8192')
          | reject('equalto', 'intel_idle.max_cstate=0')
          | reject('equalto', 'processor.max_cstate=0')
          | reject('match', '^amd_pstate=')
          | reject('match', '^nohz_full=')
          | reject('match', '^isolcpus=')
          | reject('match', '^irqaffinity=')
          | list
        )
        + _server_initial_setup_grub_canonical_params
      }}
  when: ansible_facts['architecture'] == "x86_64"

- name: Build rendered GRUB line for CPU isolation
  ansible.builtin.set_fact:
    _grub_cmdline_linux_default: >-
      GRUB_CMDLINE_LINUX_DEFAULT="{{ _server_initial_setup_grub_cmdline_params | join(' ') }}"
  when: ansible_facts['architecture'] == "x86_64"

- name: Ensure GRUB defaults drop-in directory exists
  ansible.builtin.file:
    path: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - ansible_facts['architecture'] == "x86_64"
    - not (cpu_isolation_validation_only | default(false) | bool)

- name: Configure late GRUB defaults drop-in for validator kernel parameters
  ansible.builtin.copy:
    dest: /etc/default/grub.d/99-hayek-validator-kernel-params.cfg
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible server_initial_setup.
      # Provider GRUB defaults are preserved before validator kernel parameters.
      {{ _grub_cmdline_linux_default }}
  when:
    - ansible_facts['architecture'] == "x86_64"
    - not (cpu_isolation_validation_only | default(false) | bool)

- name: Update GRUB
  ansible.builtin.command: update-grub
  when:
    - ansible_facts['architecture'] == "x86_64"
    - not (cpu_isolation_validation_only | default(false) | bool)

- name: Verify generated GRUB config includes validator kernel parameters
  ansible.builtin.shell: |
    set -eu
    grub_config_files=()

    if [ -f /boot/grub/grub.cfg ]; then
      grub_config_files+=(/boot/grub/grub.cfg)
    fi

    if [ -d /boot/efi/EFI ]; then
      while IFS= read -r -d '' grub_config_file; do
        grub_config_files+=("$grub_config_file")
      done < <(find /boot/efi/EFI -type f -name '*.cfg' -print0)
    fi

    if [ -z "${grub_config_files[*]:-}" ]; then
      echo "No generated GRUB config files found."
      exit 1
    fi

    missing=0
    for required_param in \
      audit=1 \
      audit_backlog_limit=8192 \
      intel_idle.max_cstate=0 \
      processor.max_cstate=0 \
      isolcpus= \
      irqaffinity=; do
      if grep -Fq -- "$required_param" "${grub_config_files[@]}"; then
        echo "$required_param present"
      else
        echo "$required_param missing"
        missing=1
      fi
    done

    exit "$missing"
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - ansible_facts['architecture'] == "x86_64"
    - not (cpu_isolation_validation_only | default(false) | bool)
    - not ansible_check_mode

- name: Print CPU isolation validation summary
  ansible.builtin.debug:
    msg: |
      CPU Isolation Validation Summary
      - PoH core: {{ _cpu_poh }}
      - HT sibling: {{ _cpu_sibling }}
      - Total logical CPUs: {{ _cpu_total }}
      - Thread siblings list: {{ _thread_siblings.stdout | trim }}
      - IRQ affinity: {{ _irq_cores.stdout | trim }}
  when:
    - ansible_facts['architecture'] == "x86_64"
    - cpu_isolation_validation_only | default(false) | bool

- name: Print rendered GRUB line for CPU isolation validation
  ansible.builtin.debug:
    msg: |
      {{ _grub_cmdline_linux_default }}
  when:
    - ansible_facts['architecture'] == "x86_64"
    - cpu_isolation_validation_only | default(false) | bool
