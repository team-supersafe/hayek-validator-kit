---
- name: Mark SSH/firewall tasks as executed
  ansible.builtin.set_fact:
    server_initial_setup_security_tasks_ran: true

# Detect whether the host ships with socket-activated SSH.
- name: Find ssh.socket unit file
  ansible.builtin.find:
    paths:
      - /lib/systemd/system
      - /usr/lib/systemd/system
    patterns: "ssh.socket"
    file_type: file
  register: ssh_socket_unit_files

# Standardize on ssh.service so the SSH port is controlled only by sshd_config.
# Ubuntu's socket activation can add generator/drop-in state that keeps ssh.service
# tied to ssh.socket even after disable/stop, so clear that first.
- name: Disable sshd socket generator
  ansible.builtin.file:
    path: /etc/systemd/system-generators/sshd-socket-generator
    state: link
    src: /dev/null
    force: true
  when: ssh_socket_unit_files.files | length > 0

- name: Remove ssh.service socket-activation drop-in
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.service.d/00-socket.conf
    state: absent
  when: ssh_socket_unit_files.files | length > 0

- name: Remove ssh.socket address override drop-in
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d/addresses.conf
    state: absent
  when: ssh_socket_unit_files.files | length > 0

- name: Reload systemd after disabling socket activation
  ansible.builtin.systemd:
    daemon_reload: true
  when: ssh_socket_unit_files.files | length > 0

- name: Disable socket-activated SSH listener
  ansible.builtin.systemd:
    name: ssh.socket
    state: stopped
    enabled: false
    masked: false
  when: ssh_socket_unit_files.files | length > 0

- name: Ensure ssh.service is enabled and running
  ansible.builtin.systemd:
    name: ssh.service
    state: started
    enabled: true
    masked: false

# Configure SSH port
- name: Change SSH port to {{ ssh_config.port }}
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port '
    line: 'Port {{ ssh_config.port }}'
  notify: Restart ssh



# Configure firewall
- name: Disable package automation before package installs
  ansible.builtin.import_tasks: disable_package_automation.yml

- name: Wait for package manager readiness before package installs
  ansible.builtin.import_tasks: wait_for_package_manager.yml

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present
    lock_timeout: 300

- name: Ensure authorized IP CSV data is loaded before changing SSH access controls
  ansible.builtin.assert:
    that:
      - authorized_ips_csv is defined
      - authorized_ips_csv.dict is defined
      - authorized_ips_csv.dict | length > 0
    fail_msg: >
      authorized_ips_csv must be loaded before running SSH/firewall security tasks.
      Run the role through main.yml with csv_file set so the access precheck can
      load the trusted IP list.

# Remove all existing allow rules for SSH port before applying new ones
- name: Remove all existing allow rules for SSH port {{ firewall.ssh_port }}
  ansible.builtin.shell: |
    ufw status numbered | awk '/ALLOW IN/ && /{{ firewall.ssh_port }}\/tcp/ {print $1}' | sort -rn | while read num; do ufw --force delete $num; done
  args:
    warn: false
  changed_when: false
  failed_when: false
  become: true

- name: Build trusted source IP list for SSH access controls
  ansible.builtin.set_fact:
    server_initial_setup_trusted_source_ips: >-
      {{
        (
          (fail2ban.sshd.ignoreip | default('127.0.0.1') | replace(',', ' ') | split())
          +
          (
            (authorized_ips_csv.dict.values() | map(attribute='ip') | list)
            if authorized_ips_csv is defined
            else []
          )
        )
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}

- name: "Allow authorized IPs from CSV on port {{ firewall.ssh_port }}"
  community.general.ufw:
    rule: allow
    port: '{{ firewall.ssh_port }}'
    proto: tcp
    from_ip: "{{ item.value.ip }}"
    comment: "{{ item.value.comment }}"
  loop: "{{ authorized_ips_csv.dict | dict2items }}"
  loop_control:
    label: "{{ item.value.ip }} ({{ item.value.comment }})"
  when: authorized_ips_csv is defined and authorized_ips_csv.dict | length > 0


- name: Allow TCP port ranges
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall.tcp_ranges }}"

- name: Remove rule that allow TCP port 22
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    delete: true

- name: Remove rule that allow UDP port 22
  community.general.ufw:
    rule: allow
    port: '22'
    proto: udp
    delete: true

- name: Deny RPC ports
  community.general.ufw:
    rule: deny
    port: "{{ item }}"
    proto: "{{ proto }}"
  loop: "{{ firewall.denied_ports }}"
  loop_control:
    loop_var: item
  vars:
    proto: tcp

- name: Deny RPC ports UDP
  community.general.ufw:
    rule: deny
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall.denied_ports }}"

- name: Allow UDP port ranges
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall.udp_ranges }}"

- name: Allow specific TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall.tcp_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: reject  # Continue if it's already enabled

# Install fail2ban
- name: Ensure fail2ban is installed
  ansible.builtin.apt:
    name: fail2ban
    state: present
    lock_timeout: 300

# Clean existing fail2ban config before setting up new one
- name: Remove existing fail2ban defaults config
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d/defaults-debian.conf
    state: absent

# Ensure fail2ban config for Debian defaults
- name: Ensure fail2ban config for Debian defaults
  become: true
  ansible.builtin.blockinfile:
    path: /etc/fail2ban/jail.d/defaults-debian.conf
    block: |
      [DEFAULT]
      banaction = nftables
      banaction_allports = nftables[type=allports]
      backend = systemd

      [sshd]
      enabled = true
      port = {{ firewall.ssh_port }}
      maxretry = {{ fail2ban.sshd.maxretry }}
      findtime = {{ fail2ban.sshd.findtime }}
      bantime = {{ fail2ban.sshd.bantime }}
      ignoreip = {{ server_initial_setup_trusted_source_ips | join(' ') }}
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
  notify: Restart fail2ban

# Configure specific SSH security settings only
- name: Remove all PermitRootLogin lines
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    state: absent
  notify: Restart ssh

- name: Add PermitRootLogin configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: 'PermitRootLogin {{ ssh_config.permit_root_login }}'
    insertafter: '^# Authentication:'
  notify: Restart ssh

- name: Configure SSH security - PubkeyAuthentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication {{ ssh_config.pubkey_authentication }}'
  notify: Restart ssh

- name: Configure SSH security - PasswordAuthentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication {{ ssh_config.password_authentication }}'
  notify: Restart ssh

- name: Configure SSH security - KbdInteractiveAuthentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?KbdInteractiveAuthentication'
    line: 'KbdInteractiveAuthentication {{ ssh_config.kbd_interactive_authentication }}'
  notify: Restart ssh

- name: Configure SSH security - ChallengeResponseAuthentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: 'ChallengeResponseAuthentication {{ ssh_config.challenge_response_authentication }}'
  notify: Restart ssh

- name: Ensure sshd_config has standard readable permissions
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0644'

# Find and update all files in sshd_config.d directory
- name: Find all files in sshd_config.d directory
  ansible.builtin.find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: ssh_config_files

- name: Configure PasswordAuthentication in all sshd_config.d files
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication {{ ssh_config.password_authentication }}'
  with_items: "{{ ssh_config_files.files }}"
  notify: Restart ssh
  when: ssh_config_files.files | length > 0

# Restart UFW firewall
- name: Restart UFW service
  ansible.builtin.service:
    name: ufw
    state: restarted
  become: true

- name: Ensure UFW is enabled and started
  community.general.ufw:
    state: enabled
  become: true
