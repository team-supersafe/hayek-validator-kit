---
- name: Set Jito-Solana binary source defaults
  ansible.builtin.set_fact:
    s3_release_base_url: "{{ s3_release_base_url | default('https://solv-store.s3.us-east-1.amazonaws.com') }}"
    jito_manifest_enabled: "{{ use_binary_manifest | default(true) | bool }}"
    jito_manifest_url: "{{ jito_manifest_url | default((s3_release_base_url | default('https://solv-store.s3.us-east-1.amazonaws.com')) ~ '/manifests/solana-binary-manifest-v' ~ jito_version ~ '.json') }}"
    jito_solana_download_url_fallback: "{{ (s3_release_base_url | default('https://solv-store.s3.us-east-1.amazonaws.com')) ~ '/jito-solana/releases/download/' ~ jito_tag ~ '/solana-release-' ~ host_arch ~ '.tar.bz2' }}"

- name: Fetch Jito-Solana binary manifest (best-effort)
  ansible.builtin.uri:
    url: "{{ jito_manifest_url }}"
    method: GET
    return_content: true
    status_code:
      - 200
      - 404
    timeout: 20
  register: jito_manifest_response
  changed_when: false
  failed_when: false
  when: jito_manifest_enabled

- name: Parse Jito-Solana binary manifest
  ansible.builtin.set_fact:
    jito_manifest_json: "{{ jito_manifest_response.content | from_json }}"
  when:
    - jito_manifest_enabled
    - jito_manifest_response.status | default(0) == 200

- name: Select Jito-Solana manifest entry for requested version and architecture
  ansible.builtin.set_fact:
    jito_manifest_entry: >-
      {{
        (
          jito_manifest_json.entries | default([])
          | selectattr('client', 'equalto', 'jito-solana')
          | selectattr('version', 'equalto', jito_version)
          | selectattr('arch', 'equalto', host_arch)
          | list
          | first
        ) | default({})
      }}
  when: jito_manifest_json is defined

- name: Resolve Jito-Solana manifest URL candidates
  ansible.builtin.set_fact:
    jito_manifest_entry_s3_key: "{{ jito_manifest_entry.s3_key | default(jito_manifest_entry.destination_key | default(jito_manifest_entry.staging_key | default(''))) }}"
    jito_solana_download_url_manifest: "{{ jito_manifest_entry.release_url | default(jito_manifest_entry.destination_url | default(jito_manifest_entry.staging_url | default(''))) }}"
    jito_solana_checksum_manifest: "{{ jito_manifest_entry.sha256 | default(jito_manifest_entry.checksum_sha256 | default('')) }}"
  when:
    - jito_manifest_entry is defined
    - jito_manifest_entry | length > 0

- name: Build Jito-Solana manifest URL from key when direct URL is absent
  ansible.builtin.set_fact:
    jito_solana_download_url_manifest: "{{ s3_release_base_url ~ '/' ~ jito_manifest_entry_s3_key }}"
  when:
    - jito_solana_download_url_manifest | default('') == ''
    - jito_manifest_entry_s3_key | default('') != ''

- name: Set final Jito-Solana download URL (manifest first, fallback second)
  ansible.builtin.set_fact:
    jito_solana_download_url: "{{ (jito_solana_download_url_manifest | default('')) if (jito_solana_download_url_manifest | default('')) != '' else jito_solana_download_url_fallback }}"
    jito_solana_download_checksum: "{{ ('sha256:' ~ jito_solana_checksum_manifest) if (jito_solana_checksum_manifest | default('')) != '' else '' }}"

- name: Debug download URL
  ansible.builtin.debug:
    msg:
      - "Download URL: {{ jito_solana_download_url }}"
      - "URL source: {{ 'manifest' if (jito_solana_download_url_manifest | default('')) != '' else 'fallback' }}"

- name: Ensure solana installed releases directory exists
  ansible.builtin.file:
    path: "{{ system_solana_installed_releases_dir }}"
    owner: "root"
    group: "root"
    mode: "2775"
    state: directory
  become: true

- name: Set local variable for solana_installed_release_dir
  ansible.builtin.set_fact:
    solana_installed_release_dir: "{{ system_solana_installed_releases_dir }}/{{ jito_tag }}"
    jito_staging_release_root: "{{ system_solana_installed_releases_dir }}/{{ jito_tag }}/.solana-release-staging"
    jito_backup_release_dir: "{{ system_solana_installed_releases_dir }}/{{ jito_tag }}/.solana-release-backup"

- name: Ensure Solana CLI releases directory exists
  ansible.builtin.file:
    path: "{{ solana_installed_release_dir }}"
    owner: "root"
    group: "root"
    mode: "2755"
    state: directory
  become: true

- name: Unarchiving jito-solana binaries into the releases directory
  ansible.builtin.debug:
    msg: "Unarchive release directory: {{ solana_installed_release_dir }}"

- name: Download jito-solana binaries archive
  ansible.builtin.get_url:
    url: "{{ jito_solana_download_url }}"
    dest: "/tmp/{{ jito_tag }}-{{ host_arch }}.tar.bz2"
    mode: "0644"
    force: true
    checksum: "{{ jito_solana_download_checksum if (jito_solana_download_checksum | default('')) != '' else omit }}"
    timeout: 60
  failed_when: false
  register: jito_archive_download
  become: true

- name: Remove previous Jito staging and backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ jito_staging_release_root }}"
    - "{{ jito_backup_release_dir }}"
  become: true

- name: Fail when jito-solana archive download is unavailable
  ansible.builtin.fail:
    msg: >-
      Failed to download Jito-Solana archive from {{ jito_solana_download_url }}.
      This usually means the binary was not published for version {{ jito_version }}
      and architecture {{ host_arch }}, or the object is not publicly readable.
      If you expected a prebuilt binary, publish/promote it first or use a version
      present in the binary manifest. Otherwise set build_from_source=true.
  when:
    - not ansible_check_mode
    - jito_archive_download is failed

- name: Create Jito staging directory
  ansible.builtin.file:
    path: "{{ jito_staging_release_root }}"
    owner: "root"
    group: "root"
    mode: "0755"
    state: directory
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded

- name: Unarchive jito-solana binaries
  ansible.builtin.unarchive:
    src: "{{ jito_archive_download.dest }}"
    dest: "{{ jito_staging_release_root }}"
    remote_src: true
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded

- name: Check staged Jito-Solana binary
  ansible.builtin.stat:
    path: "{{ jito_staging_release_root }}/solana-release/bin/solana"
  register: jito_staged_cli_binary
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded

- name: Fail when staged Jito archive payload is incomplete
  ansible.builtin.fail:
    msg: >-
      Downloaded Jito-Solana archive from {{ jito_solana_download_url }}, but
      the extracted payload is missing solana-release/bin/solana.
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded
    - not jito_staged_cli_binary.stat.exists

- name: Check whether an existing Jito release payload is present
  ansible.builtin.stat:
    path: "{{ solana_installed_release_dir }}/solana-release"
  register: jito_existing_release_payload
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded
    - jito_staged_cli_binary.stat.exists

- name: Move existing Jito release payload aside before swap
  ansible.builtin.command:
    argv:
      - mv
      - "{{ solana_installed_release_dir }}/solana-release"
      - "{{ jito_backup_release_dir }}"
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded
    - jito_staged_cli_binary.stat.exists
    - jito_existing_release_payload.stat.exists

- name: Move staged Jito release payload into place
  ansible.builtin.command:
    argv:
      - mv
      - "{{ jito_staging_release_root }}/solana-release"
      - "{{ solana_installed_release_dir }}/solana-release"
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded
    - jito_staged_cli_binary.stat.exists

- name: Remove Jito backup and staging directories after successful swap
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ jito_staging_release_root }}"
    - "{{ jito_backup_release_dir }}"
  become: true
  when:
    - not ansible_check_mode
    - jito_archive_download is succeeded
    - jito_staged_cli_binary.stat.exists

- name: Fix ownership of release directory and contents
  ansible.builtin.file:
    path: "{{ solana_installed_release_dir }}"
    owner: "root"
    group: "root"
    mode: "755"
    recurse: true
  become: true

- name: Create symlink to new release
  ansible.builtin.file:
    src: "{{ solana_installed_release_dir }}/solana-release"
    dest: "{{ system_solana_install_dir }}/active_release"
    state: link
    owner: "root"
    group: "root"
    force: true
  become: true
