---
- name: verify - Verify source validator identity files
  block:
    - name: verify - Check source hot-spare identity file
      ansible.builtin.stat:
        path: "{{ source_host_keys_dir }}/hot-spare-identity.json"
      register: source_hotspare_identity
      when: inventory_hostname == source_host

    - name: verify - Check source primary target identity file
      ansible.builtin.stat:
        path: "{{ source_host_keys_dir }}/primary-target-identity.json"
      register: source_primary_identity
      when: inventory_hostname == source_host

    - name: verify - Get source validator running identity pubkey
      ansible.builtin.shell: |
        set -o pipefail
        {{ system_solana_active_release_dir }}/agave-validator -l {{ ledger_path }} contact-info |
          awk '/^Identity:/ { print $2; exit }'
      args:
        executable: /bin/bash
      register: source_running_pubkey
      changed_when: false
      failed_when: source_running_pubkey.rc != 0 or (source_running_pubkey.stdout | default('') | trim) == ''
      become: true
      become_user: "{{ solana_user }}"
      when: inventory_hostname == source_host

    - name: verify - Get source hot-spare identity pubkey
      ansible.builtin.command: >
        {{ system_solana_active_release_dir }}/solana-keygen pubkey
        {{ source_host_keys_dir }}/hot-spare-identity.json
      register: source_hotspare_pubkey
      become: true
      become_user: "{{ solana_user }}"
      when:
        - inventory_hostname == source_host
        - source_hotspare_identity.stat.exists

    - name: verify - Get source primary target identity pubkey
      ansible.builtin.command: >
        {{ system_solana_active_release_dir }}/solana-keygen pubkey
        {{ source_host_keys_dir }}/primary-target-identity.json
      register: source_primary_pubkey
      become: true
      become_user: "{{ solana_user }}"
      when:
        - inventory_hostname == source_host
        - source_primary_identity.stat.exists

- name: verify - Verify destination validator identity files
  block:
    - name: verify - Check destination primary target identity file
      ansible.builtin.stat:
        path: "{{ destination_host_primary_target_identity_path }}"
      register: destination_primary_identity
      when: inventory_hostname == destination_host

    - name: verify - Get destination validator running identity pubkey
      ansible.builtin.shell: |
        set -o pipefail
        {{ system_solana_active_release_dir }}/agave-validator -l {{ ledger_path }} contact-info |
          awk '/^Identity:/ { print $2; exit }'
      args:
        executable: /bin/bash
      register: destination_running_pubkey
      changed_when: false
      failed_when: destination_running_pubkey.rc != 0 or (destination_running_pubkey.stdout | default('') | trim) == ''
      become: true
      become_user: "{{ solana_user }}"
      when: inventory_hostname == destination_host

    - name: verify - Get destination primary target identity pubkey
      ansible.builtin.command: >
        {{ system_solana_active_release_dir }}/solana-keygen pubkey
        {{ destination_host_primary_target_identity_path }}
      register: destination_primary_pubkey
      become: true
      become_user: "{{ solana_user }}"
      when:
        - inventory_hostname == destination_host
        - destination_primary_identity.stat.exists

- name: verify - Make identity pubkeys available globally
  ansible.builtin.set_fact:
    source_running_pubkey: "{{ (hostvars[source_host]['source_running_pubkey'] | default({'stdout': ''}))['stdout'] | default('') | trim }}"
    destination_running_pubkey: "{{ (hostvars[destination_host]['destination_running_pubkey'] | default({'stdout': ''}))['stdout'] | default('') | trim }}"
    source_hotspare_pubkey: "{{ ((hostvars[source_host]['source_hotspare_pubkey'] | default({'stdout_lines': ['']}))['stdout_lines'] | first) | default('') }}"
    source_primary_pubkey: "{{ ((hostvars[source_host]['source_primary_pubkey'] | default({'stdout_lines': ['']}))['stdout_lines'] | first) | default('') }}"
    destination_primary_pubkey: "{{ ((hostvars[destination_host]['destination_primary_pubkey'] | default({'stdout_lines': ['']}))['stdout_lines'] | first) | default('') }}"
  run_once: true

- name: verify - Verify source validator is using hot-spare identity
  ansible.builtin.fail:
    msg: |
      Source validator is not using the hot-spare identity!
      Expected: {{ source_hotspare_pubkey | default('Not found') }}
      Actual: {{ source_running_pubkey | default('Not found') }}
  when:
    - inventory_hostname == source_host
    - source_running_pubkey != source_hotspare_pubkey
    - source_running_pubkey != ''
    - source_hotspare_pubkey != ''

- name: verify - Verify destination validator is using primary target identity
  ansible.builtin.fail:
    msg: |
      Destination validator is not using the primary target identity!
      Expected: {{ destination_primary_pubkey | default('Not found') }}
      Actual: {{ destination_running_pubkey | default('Not found') }}
  when:
    - inventory_hostname == destination_host
    - destination_running_pubkey != destination_primary_pubkey
    - destination_running_pubkey != ''
    - destination_primary_pubkey != ''

- name: verify - Validate post-swap runtime identities on localnet
  block:
    - name: verify - Get expected source hot-spare identity pubkey
      ansible.builtin.command: >
        solana-keygen pubkey {{ source_host_keys_dir }}/hot-spare-identity.json
      register: expected_source_hotspare_pubkey
      environment:
        PATH: "{{ system_solana_active_release_dir }}"
      when: inventory_hostname == source_host
      changed_when: false
      check_mode: false

    - name: verify - Wait for source validator runtime identity to switch to hot-spare
      ansible.builtin.shell: >
        {{ system_solana_active_release_dir }}/agave-validator -l {{ ledger_path }} contact-info | head -1 | sed 's/Identity: //'
      register: source_runtime_identity_after
      when: inventory_hostname == source_host
      become: true
      become_user: "{{ solana_user }}"
      changed_when: false
      check_mode: false
      failed_when: false
      retries: 20
      delay: 3
      until:
        - source_runtime_identity_after.stdout is defined
        - source_runtime_identity_after.stdout | trim == expected_source_hotspare_pubkey.stdout | trim

    - name: verify - Fail if source validator runtime identity did not switch on localnet
      ansible.builtin.fail:
        msg: |
          Source validator runtime identity did not switch to the hot-spare on localnet.
          Expected: {{ expected_source_hotspare_pubkey.stdout | default('unknown') }}
          Actual: {{ source_runtime_identity_after.stdout | default('') }}
      when:
        - inventory_hostname == source_host
        - source_runtime_identity_after.stdout is not defined or source_runtime_identity_after.stdout | trim != expected_source_hotspare_pubkey.stdout | trim

    - name: verify - Get expected destination primary identity pubkey
      ansible.builtin.command: >
        solana-keygen pubkey {{ destination_host_primary_target_identity_path }}
      register: expected_destination_primary_pubkey
      environment:
        PATH: "{{ system_solana_active_release_dir }}"
      when: inventory_hostname == destination_host
      changed_when: false
      check_mode: false

    - name: verify - Wait for destination validator runtime identity to switch to primary target
      ansible.builtin.shell: >
        {{ system_solana_active_release_dir }}/agave-validator -l {{ ledger_path }} contact-info | head -1 | sed 's/Identity: //'
      register: destination_runtime_identity_after
      when: inventory_hostname == destination_host
      become: true
      become_user: "{{ solana_user }}"
      changed_when: false
      check_mode: false
      failed_when: false
      retries: 20
      delay: 3
      until:
        - destination_runtime_identity_after.stdout is defined
        - destination_runtime_identity_after.stdout | trim == expected_destination_primary_pubkey.stdout | trim

    - name: verify - Fail if destination validator runtime identity did not switch on localnet
      ansible.builtin.fail:
        msg: |
          Destination validator runtime identity did not switch to the primary target on localnet.
          Expected: {{ expected_destination_primary_pubkey.stdout | default('unknown') }}
          Actual: {{ destination_runtime_identity_after.stdout | default('') }}
      when:
        - inventory_hostname == destination_host
        - destination_runtime_identity_after.stdout is not defined or destination_runtime_identity_after.stdout | trim != expected_destination_primary_pubkey.stdout | trim
  when: solana_cluster == 'localnet'

- name: verify - Get vote account data after swap
  block:
    - name: verify - Determine Solana cluster parameter
      ansible.builtin.import_tasks: ../../solana_validator_shared/tasks/determine_solana_cluster_param.yml

    - name: verify - Get validator identity pubkey at destination host
      ansible.builtin.command: >
        {{ system_solana_active_release_dir }}/solana-keygen pubkey
        {{ destination_host_primary_target_identity_path }}
      register: validator_identity_pubkey
      become: true
      become_user: "{{ solana_user }}"
      when: inventory_hostname == destination_host
      changed_when: false
      check_mode: false

    - name: verify - Fail if validator identity pubkey could not be resolved
      ansible.builtin.fail:
        msg: >-
          Failed to resolve the validator identity pubkey from
          {{ destination_host_primary_target_identity_path }}.
          rc={{ validator_identity_pubkey.rc | default('N/A') }}
          stdout={{ validator_identity_pubkey.stdout | default('') | trim }}
          stderr={{ validator_identity_pubkey.stderr | default('') | trim }}
      when:
        - inventory_hostname == destination_host
        - validator_identity_pubkey.rc != 0 or (validator_identity_pubkey.stdout | default('') | trim) == ''

    - name: verify - Prefer the known source vote account address
      ansible.builtin.set_fact:
        post_swap_vote_account_address: "{{ hostvars[source_host]['source_vote_pubkey'] }}"
      when:
        - hostvars[source_host]['source_vote_pubkey'] is defined
        - hostvars[source_host]['source_vote_pubkey'] != ''

    - name: verify - Get vote account address from validator identity (fallback)
      ansible.builtin.shell: |
        set -o pipefail
        {{ system_solana_active_release_dir }}/solana {{ solana_cluster_param }} validators --keep-unstaked-delinquents --output json |
          jq -r '.validators[] | select(.identityPubkey == "{{ validator_identity_pubkey.stdout | trim }}") | .voteAccountPubkey'
      args:
        executable: /bin/bash
      register: vote_account_address_result
      when:
        - inventory_hostname == destination_host
        - post_swap_vote_account_address is not defined or post_swap_vote_account_address == ''
        - validator_identity_pubkey.stdout | default('') | trim != ''
      changed_when: false
      check_mode: false
      failed_when: false
      retries: 15
      delay: 2
      until:
        - vote_account_address_result.stdout is defined
        - vote_account_address_result.stdout | trim != ''

    - name: verify - Save fallback vote account address
      ansible.builtin.set_fact:
        post_swap_vote_account_address: "{{ vote_account_address_result.stdout | trim }}"
      when:
        - inventory_hostname == destination_host
        - vote_account_address_result is defined
        - vote_account_address_result.stdout is defined
        - vote_account_address_result.stdout | trim != ''

    - name: verify - Fail if post-swap vote account address is unavailable
      ansible.builtin.fail:
        msg: |
          Unable to determine the post-swap vote account address for identity {{ validator_identity_pubkey.stdout | default('unknown') }}.
          Preferred source vote account: {{ hostvars[source_host]['source_vote_pubkey'] | default('not available') }}
          Fallback lookup stdout: {{ vote_account_address_result.stdout | default('') }}
          Fallback lookup stderr: {{ vote_account_address_result.stderr | default('') }}
      when:
        - inventory_hostname == destination_host
        - post_swap_vote_account_address is not defined or post_swap_vote_account_address == ''

    - name: verify - Get vote account data from destination validator
      ansible.builtin.command: >
        {{ system_solana_active_release_dir }}/solana vote-account
        {{ solana_cluster_param }} {{ post_swap_vote_account_address }} --output json
      register: source_vote_account_after
      environment:
        PATH: "{{ system_solana_active_release_dir }}"
      become: true
      become_user: "{{ solana_user }}"
      when:
        - inventory_hostname == destination_host
        - post_swap_vote_account_address | default('') | trim != ''
      changed_when: false
      check_mode: false
      failed_when: false
      retries: 20
      delay: 3
      until:
        - source_vote_account_after.rc == 0
        - source_vote_account_after.stdout is defined
        - source_vote_account_after.stdout | trim != ''

    - name: verify - Fail if vote account data remains unavailable after swap
      ansible.builtin.fail:
        msg: |
          Failed to read post-swap vote account {{ post_swap_vote_account_address | default('unknown') }}.
          RC: {{ source_vote_account_after.rc | default('unknown') }}
          Msg: {{ source_vote_account_after.msg | default('') }}
          Stdout: {{ source_vote_account_after.stdout | default('') }}
          Stderr: {{ source_vote_account_after.stderr | default('') }}
      when:
        - inventory_hostname == destination_host
        - source_vote_account_after.rc is not defined or source_vote_account_after.rc != 0

    - name: verify - Parse vote account data after swap
      ansible.builtin.set_fact:
        vote_account_after: "{{ source_vote_account_after.stdout | from_json }}"
      when:
        - inventory_hostname == destination_host
        - source_vote_account_after.stdout is defined
        - source_vote_account_after.stdout != ''

    - name: verify - Make vote account data after swap available globally
      ansible.builtin.set_fact:
        vote_account_after: "{{ hostvars[destination_host]['vote_account_after'] }}"
      run_once: true
      when:
        - hostvars[destination_host]['vote_account_after'] is defined

    - name: verify - Store post-swap stats
      ansible.builtin.set_fact:
        post_swap_stats:
          epoch: "{{ vote_account_after.epochVotingHistory[-1] }}"
          credits_earned: "{{ vote_account_after.epochVotingHistory[-1].creditsEarned }}"
          max_possible_credits: >-
            {{
              vote_account_after.epochVotingHistory[-1].slotsInEpoch *
              vote_account_after.epochVotingHistory[-1].maxCreditsPerSlot
            }}
      run_once: true
      when:
        - vote_account_after is defined
        - vote_account_after.epochVotingHistory is defined
        - vote_account_after.epochVotingHistory | length > 0

- name: verify - Calculate TVC impact
  block:
    - name: verify - Calculate missed credits
      ansible.builtin.set_fact:
        missed_credits: >-
          {{
            (post_swap_stats.credits_earned | int) - (pre_swap_stats.credits_earned | int)
          }}
        max_possible_credits: "{{ pre_swap_stats.max_possible_credits }}"
      run_once: true
      when:
        - pre_swap_stats is defined
        - post_swap_stats is defined

    - name: verify - Calculate credits loss percentage
      ansible.builtin.set_fact:
        credits_loss_percentage: >-
          {{
            (missed_credits | int / pre_swap_stats.max_possible_credits | int * 100) | round(2)
          }}
      run_once: true
      when:
        - pre_swap_stats is defined
        - missed_credits is defined
