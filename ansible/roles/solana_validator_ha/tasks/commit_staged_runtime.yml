---
- name: solana_validator_ha - Prepare runtime variables before staged commit
  ansible.builtin.import_tasks: prepare_runtime_vars.yml

- name: solana_validator_ha - Assert staged runtime files are present
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: true
  loop:
    - "{{ solana_validator_ha_staged_public_ip_file_path }}"
    - "{{ solana_validator_ha_staged_config_path }}"
  register: solana_validator_ha_commit_stage_files
  changed_when: false
  become: true

- name: solana_validator_ha - Validate staged runtime files before commit
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
    fail_msg: "Cannot commit HA runtime because staged file {{ item.item }} is missing."
  loop: "{{ solana_validator_ha_commit_stage_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: solana_validator_ha - Capture current runtime file state before commit
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: true
  loop:
    - "{{ solana_validator_ha_public_ip_file_path }}"
    - "{{ solana_validator_ha_config_path }}"
  register: solana_validator_ha_runtime_file_state
  changed_when: false
  become: true

- name: solana_validator_ha - Derive staged versus live runtime changes
  ansible.builtin.set_fact:
    solana_validator_ha_commit_public_ip_changed: >-
      {{
        (
          not (
            solana_validator_ha_runtime_file_state.results
            | selectattr('item', 'equalto', solana_validator_ha_public_ip_file_path)
            | map(attribute='stat.exists')
            | first
            | default(false)
          )
        ) or (
          (
            solana_validator_ha_commit_stage_files.results
            | selectattr('item', 'equalto', solana_validator_ha_staged_public_ip_file_path)
            | map(attribute='stat.checksum')
            | first
          ) != (
            solana_validator_ha_runtime_file_state.results
            | selectattr('item', 'equalto', solana_validator_ha_public_ip_file_path)
            | map(attribute='stat.checksum')
            | first
            | default('')
          )
        )
      }}
    solana_validator_ha_commit_config_changed: >-
      {{
        (
          not (
            solana_validator_ha_runtime_file_state.results
            | selectattr('item', 'equalto', solana_validator_ha_config_path)
            | map(attribute='stat.exists')
            | first
            | default(false)
          )
        ) or (
          (
            solana_validator_ha_commit_stage_files.results
            | selectattr('item', 'equalto', solana_validator_ha_staged_config_path)
            | map(attribute='stat.checksum')
            | first
          ) != (
            solana_validator_ha_runtime_file_state.results
            | selectattr('item', 'equalto', solana_validator_ha_config_path)
            | map(attribute='stat.checksum')
            | first
            | default('')
          )
        )
      }}
    solana_validator_ha_commit_public_ip_service_needs_restart: >-
      {{
        solana_validator_ha_stage_public_ip_service_unit_changed | default(false) | bool
      }}

- name: solana_validator_ha - Determine whether HA service restart is required
  ansible.builtin.set_fact:
    solana_validator_ha_commit_ha_service_needs_restart: >-
      {{
        (
          solana_validator_ha_stage_ha_service_unit_changed | default(false) | bool
        ) or (
          solana_validator_ha_commit_config_changed | default(false) | bool
        )
      }}

- name: solana_validator_ha - Backup live runtime files before commit
  ansible.builtin.copy:
    src: "{{ item.item }}"
    dest: "{{ item.item }}.bak.{{ solana_validator_ha_reconcile_generation }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ '0644' if item.item == solana_validator_ha_public_ip_file_path else '0640' }}"
  loop: "{{ solana_validator_ha_runtime_file_state.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.stat.exists | default(false)
    - >
      (
        item.item == solana_validator_ha_public_ip_file_path and
        (solana_validator_ha_commit_public_ip_changed | default(false) | bool)
      ) or (
        item.item == solana_validator_ha_config_path and
        (solana_validator_ha_commit_config_changed | default(false) | bool)
      )
  become: true

- name: solana_validator_ha - Install committed public IP file
  ansible.builtin.copy:
    src: "{{ solana_validator_ha_staged_public_ip_file_path }}"
    dest: "{{ solana_validator_ha_public_ip_file_path }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0644"
  register: solana_validator_ha_commit_public_ip_copy_result
  when: solana_validator_ha_commit_public_ip_changed | default(false) | bool
  become: true

- name: solana_validator_ha - Install committed HA configuration file
  ansible.builtin.copy:
    src: "{{ solana_validator_ha_staged_config_path }}"
    dest: "{{ solana_validator_ha_config_path }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0640"
  register: solana_validator_ha_commit_config_copy_result
  when: solana_validator_ha_commit_config_changed | default(false) | bool
  become: true

- name: solana_validator_ha - Reload systemd after staged commit
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - solana_validator_ha_stage_public_ip_service_unit_changed | default(false) | bool
      or solana_validator_ha_stage_ha_service_unit_changed | default(false) | bool
  become: true

- name: solana_validator_ha - Ensure public IP helper is enabled and running
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_public_ip_service_name }}"
    enabled: true
    state: "{{ 'restarted' if (solana_validator_ha_commit_public_ip_service_needs_restart | default(false) | bool) else 'started' }}"
  become: true

- name: solana_validator_ha - Wait for public IP helper to serve the expected IP after staged commit
  ansible.builtin.uri:
    url: "http://{{ solana_validator_ha_public_ip_bind_host }}:{{ solana_validator_ha_public_ip_port }}/public-ip.txt"
    return_content: true
  register: solana_validator_ha_public_ip_helper_probe
  changed_when: false
  until:
    - solana_validator_ha_public_ip_helper_probe.status == 200
    - (solana_validator_ha_public_ip_helper_probe.content | default('') | trim) == (solana_validator_ha_effective_public_ip_value | trim)
  retries: 10
  delay: 1

- name: solana_validator_ha - Reset failed state before restarting HA service
  ansible.builtin.command: "systemctl reset-failed {{ solana_validator_ha_service_name }}"
  changed_when: false
  failed_when: false
  become: true

- name: solana_validator_ha - Restart HA service after staged commit
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
    enabled: true
    state: >-
      {{
        'restarted'
        if (
          (solana_validator_ha_restart_on_runtime_change | default(true) | bool)
          and (solana_validator_ha_commit_ha_service_needs_restart | default(false) | bool)
        )
        else 'started'
      }}
  become: true

- name: solana_validator_ha - Verify HA service is active after staged commit
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
  register: solana_validator_ha_service_status_after_commit
  changed_when: false
  until: solana_validator_ha_service_status_after_commit.status.ActiveState == "active"
  retries: 10
  delay: 1
  become: true

- name: solana_validator_ha - Assert HA service is active after staged commit
  ansible.builtin.assert:
    that:
      - solana_validator_ha_service_status_after_commit.status.ActiveState == "active"
    fail_msg: >-
      solana-validator-ha service failed to become active on {{ inventory_hostname }}
      after staged runtime commit.
