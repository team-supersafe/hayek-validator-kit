---
- name: solana_validator_ha - Prepare runtime variables
  ansible.builtin.import_tasks: prepare_runtime_vars.yml

- name: solana_validator_ha - Remove legacy identity.json symlink if present
  ansible.builtin.file:
    path: "{{ solana_validator_ha_legacy_identity_symlink_path }}"
    state: absent
  become: true

- name: solana_validator_ha - Ensure runtime configuration directory exists
  ansible.builtin.file:
    path: "{{ solana_validator_ha_config_dir }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ validator_root_dir_mode | default('2775') }}"
    state: directory
  become: true

- name: solana_validator_ha - Render role transition wrapper script
  ansible.builtin.template:
    src: ha-set-role.sh.j2
    dest: "{{ solana_validator_ha_wrapper_script_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ validator_scripts_file_mode | default('0754') }}"
  become: true
  notify:
    - solana_validator_ha - restart ha service

- name: solana_validator_ha - Write public IP file for local helper service
  ansible.builtin.copy:
    content: "{{ solana_validator_ha_effective_public_ip_value | trim }}\n"
    dest: "{{ solana_validator_ha_public_ip_file_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0644"
  become: true

- name: solana_validator_ha - Render HA configuration file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ solana_validator_ha_config_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0640"
  become: true
  notify:
    - solana_validator_ha - restart ha service

- name: solana_validator_ha - Deploy public IP helper systemd unit
  ansible.builtin.template:
    src: public-ip.service.j2
    dest: "/etc/systemd/system/{{ solana_validator_ha_public_ip_service_name }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true
  notify:
    - solana_validator_ha - reload systemd
    - solana_validator_ha - restart public ip helper

- name: solana_validator_ha - Deploy HA systemd unit
  ansible.builtin.template:
    src: service.j2
    dest: "/etc/systemd/system/{{ solana_validator_ha_service_name }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true
  notify:
    - solana_validator_ha - reload systemd
    - solana_validator_ha - restart ha service

- name: solana_validator_ha - Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: solana_validator_ha - Enable and start public IP helper
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_public_ip_service_name }}"
    enabled: true
    state: started
  become: true

- name: solana_validator_ha - Enable and start HA service
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
    enabled: true
    state: started
  become: true
