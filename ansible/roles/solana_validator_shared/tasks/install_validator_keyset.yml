---
- name: install_validator_keyset - Validate required variables
  ansible.builtin.assert:
    that:
      - validator_name is defined
      - validator_keyset_name is defined
      - validator_keys_dir is defined
      - solana_user is defined
      - ansible_home_dir is defined
    fail_msg: "One or more required variables for validator keyset installation are missing or invalid."

- name: install_validator_keyset - Validate validator_type value
  ansible.builtin.assert:
    that:
      - (validator_type | default('hot-spare')) in ['primary', 'hot-spare']
    fail_msg: "validator_type must be set to 'primary' or 'hot-spare', got: {{ validator_type | default('hot-spare') }}"

- name: install_validator_keyset - Set validator keys directory
  ansible.builtin.set_fact:
    validator_keyset_dir: "{{ validator_keys_dir }}/{{ validator_name }}"
    ansible_keys_dir: "{{ ansible_home_dir }}/.validator-keys/{{ validator_keyset_name }}"

- name: install_validator_keyset - Reset validator keys directory
  block:
    - name: install_validator_keyset - Remove validator keys directory contents
      ansible.builtin.shell: |
        #!/bin/bash
        set -e
        rm -rf "{{ validator_keys_dir }}"/*
      when: force_host_cleanup | default(false) | bool

    - name: install_validator_keyset - Ensure validator_keyset_dir exists
      ansible.builtin.file:
        path: "{{ validator_keyset_dir }}"
        state: directory
        mode: "{{ validator_data_mode_owner_readonly }}"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"
  become: true

- name: install_validator_keyset - Install validator keys
  block:
    - name: install_validator_keyset - Copy primary-target-identity.json to target host
      ansible.builtin.copy:
        src: "{{ ansible_keys_dir }}/primary-target-identity.json"
        dest: "{{ validator_keyset_dir }}/primary-target-identity.json"
        mode: "{{ validator_key_file_mode }}"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"

    - name: install_validator_keyset - Copy vote-account.json to target host
      ansible.builtin.copy:
        src: "{{ ansible_keys_dir }}/vote-account.json"
        dest: "{{ validator_keyset_dir }}/vote-account.json"
        mode: "{{ validator_key_file_mode }}"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"

    - name: install_validator_keyset - Copy hot-spare-identity.json to target host
      ansible.builtin.copy:
        src: "{{ ansible_keys_dir }}/hot-spare-identity.json"
        dest: "{{ validator_keyset_dir }}/hot-spare-identity.json"
        mode: "{{ validator_key_file_mode }}"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"

    - name: install_validator_keyset - Create identity.json symlink
      ansible.builtin.file:
        src: "{{ validator_keyset_dir }}/{{ 'primary-target-identity.json' if (validator_type | default('hot-spare')) == 'primary' else 'hot-spare-identity.json' }}"
        dest: "{{ validator_keyset_dir }}/identity.json"
        state: link
        force: true

    - name: install_validator_keyset - Fix ownership of identity.json symlink
      ansible.builtin.file:
        path: "{{ validator_keyset_dir }}/identity.json"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"
        follow: false

    - name: install_validator_keyset - Fix ownership of hot-spare-identity.json
      ansible.builtin.file:
        path: "{{ validator_keyset_dir }}/hot-spare-identity.json"
        mode: "{{ validator_key_file_mode }}"
        owner: "{{ solana_user }}"
        group: "{{ validator_operators_group }}"
  become: true
