---
- name: Prepare temporary sysadmin sudo policy for VM test automation
  hosts: "{{ target_hosts }}"
  user: "{{ bootstrap_user }}"
  become: true
  tasks:
    - name: Ensure test operator groups can sudo without password in ephemeral VM tests
      ansible.builtin.copy:
        dest: /etc/sudoers.d/98-hvk-test-sysadmin
        content: |
          %sysadmin ALL=(ALL) NOPASSWD: ALL
          %validator_operators ALL=(ALL) NOPASSWD: ALL
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
