---
# Wrapper playbook for VM harness automation.
# Intentionally keeps the requested order:
#   1) pb_setup_users_validator
#   2) pb_setup_metal_box
#
# We keep both in a single ansible-playbook invocation to preserve connection
# continuity while the bootstrap user is still active.

- name: Resolve VM wrapper defaults
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Resolve skip confirmation pauses default
      ansible.builtin.set_fact:
        vm_wrapper_skip_confirmation_pauses_resolved: "{{ skip_confirmation_pauses | default(true) }}"

- import_playbook: ../../ansible/playbooks/pb_setup_users_validator.yml
  vars:
    target_host: "{{ target_host }}"
    ansible_user: "{{ bootstrap_user }}"
    csv_file: "{{ users_csv_file }}"
    users_base_dir: "{{ users_base_dir }}"
    skip_confirmation_pauses: "{{ hostvars['localhost'].vm_wrapper_skip_confirmation_pauses_resolved }}"

- import_playbook: ../../ansible/playbooks/pb_setup_metal_box.yml
  vars:
    target_host: "{{ target_host }}"
    ansible_user: "{{ metal_box_user | default(bootstrap_user) }}"
    csv_file: "{{ authorized_ips_csv_file }}"
    authorized_access_csv: "{{ authorized_access_csv }}"
    skip_confirmation_pauses: "{{ hostvars['localhost'].vm_wrapper_skip_confirmation_pauses_resolved }}"
